<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Hello, world!</h1>
    <br>

<div id="carouselExampleFade" class="carousel slide carousel-fade">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="borboleta1.jpg" class="d-block w-100" alt="img de borboleta">
    </div>
    <div class="carousel-item">
      <img src="./gira.jpg" class="d-block w-100" alt="Gira">
    </div>
    <div class="carousel-item">
      <img src="rj.jpg" class="d-block w-100" alt="RJ">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>


    
<br><br>
    <table class="table table-success ">
        <thead>
            <tr class="table table-danger">
                <th scope="col">COD</th>
                <th scope="col">Jogadores</th>
                <th scope="col">Time</th>
                <th scope="col">Apostas</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1</th>
                <td>Luiz Suarez</td>
                <td>Inter Miami</td>

            </tr>
            <tr>

                <td>Neymar</td>
                <td>Santos</td>

            </tr>
            <tr>

                <td>Ronaldinho</td>
                <td>Grêmio</td>
               <td><a href="#1" class="btn btn-success">Aposta</a></td> 
            </tr>
        </tbody>
    </table>

</html>
